name: Apply chat recipient UI update

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply-update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/chat-recipient-ui-2.3.0-v2
          fetch-depth: 0

      - name: Apply update
        id: transform
        shell: bash
        run: |
          set +e
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/apply-chat-recipient-ui.py')
          text = path.read_text(encoding='utf-8')
          old = "text, count = re.subn(pattern, replacement, text, count=1, flags=re.S)"
          new = "text, count = re.subn(pattern, lambda _match: replacement, text, count=1, flags=re.S)"
          if old not in text:
              raise SystemExit('regex helper line not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          python3 .github/apply-chat-recipient-ui.py > /tmp/tn-transform.log 2>&1
          status=$?
          cat /tmp/tn-transform.log
          if [ $status -ne 0 ]; then
            cp /tmp/tn-transform.log .github/recipient-ui-transform-error.txt
            exit $status
          fi
          php -l tgnotify2/telegram_notify_enhanced.php

      - name: Commit diagnostics on failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/recipient-ui-transform-error.txt
          git commit -m "Add recipient UI transform diagnostics"
          git push origin HEAD:feature/chat-recipient-ui-2.3.0-v2

      - name: Commit changes
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/recipient-ui-transform-error.txt
          git add tgnotify2/telegram_notify_enhanced.php .github/recipient-ui-transform-error.txt
          git commit -m "Add named Telegram recipients and admin menu"
          git push origin HEAD:feature/chat-recipient-ui-2.3.0-v2
