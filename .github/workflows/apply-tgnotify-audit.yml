name: Apply tgnotify audit fixes

on:
  push:
    branches:
      - fix/tgnotify-audit-2.2.0

permissions:
  contents: write

jobs:
  apply-fixes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/tgnotify-audit-2.2.0
          fetch-depth: 0

      - name: Apply audited patch
        shell: bash
        run: |
          set -euo pipefail
          base64 -d .github/tgnotify-audit.patch.gz.b64 | gzip -d > /tmp/tgnotify-audit.patch
          git apply --whitespace=nowarn /tmp/tgnotify-audit.patch
          php -l tgnotify2/telegram_notify_enhanced.php
          rm -f .github/tgnotify-audit.patch.gz.b64

      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix Telegram delivery and WooCommerce compatibility"
          git push origin HEAD:fix/tgnotify-audit-2.2.0
